<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="image/cat.ico">
    <title>Página Inicial</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #f879ae;
            --delete-color: #cf6679;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-top: 50px; font-weight: 300; }

        /* Grid de Atalhos */
        #shortcuts-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
            margin-top: 40px;
        }

        .shortcut-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.2s, background 0.2s;
            position: relative;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #333;
        }

        .shortcut-card:hover {
            transform: translateY(-5px);
            background: #252525;
        }

        .shortcut-card img {
            width: 48px;
            height: 48px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .shortcut-card span {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* Botão Deletar */
        .btn-delete {
            position: absolute;
            top: 5px;
            right: 5px;
            background: none;
            border: none;
            color: var(--delete-color);
            cursor: pointer;
            font-size: 18px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .shortcut-card:hover .btn-delete {
            opacity: 1;
        }

        /* Formulário de Adição */
        .add-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            display: flex;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        input {
            background: #2c2c2c;
            border: 1px solid #444;
            padding: 10px;
            color: white;
            border-radius: 6px;
            outline: none;
        }

        button#add-btn {
            background: var(--accent-color);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
        }

        button#add-btn:hover {
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <h1 id="greeting">Bem vindo, Nicollas.</h1>

    <div class="add-box">
        <input type="text" id="site-name" placeholder="Nome (Ex: Google)">
        <input type="text" id="site-url" placeholder="URL (Ex: https://...)">
        <button id="add-btn">Adicionar</button>
    </div>

    <div id="shortcuts-container">
        <!-- Atalhos aparecerão aqui -->
    </div>

    <script>
        const container = document.getElementById('shortcuts-container');
        const nameInput = document.getElementById('site-name');
        const urlInput = document.getElementById('site-url');
        const addBtn = document.getElementById('add-btn');

        // Carregar atalhos do LocalStorage
        let shortcuts = JSON.parse(localStorage.getItem('myShortcuts')) || [];

        function renderShortcuts() {
            container.innerHTML = '';
            shortcuts.forEach((item, index) => {
                // Pegar favicon automaticamente usando o serviço do Google
                const favicon = `https://www.google.com/s2/favicons?sz=64&domain=${item.url}`;
                
                const card = document.createElement('div');
                card.className = 'shortcut-card';
                card.innerHTML = `
                    <button class="btn-delete" onclick="deleteShortcut(${index})">&times;</button>
                    <a href="${item.url}" style="text-decoration:none; color:inherit; display:flex; flex-direction:column; align-items:center; width:100%">
                        <img src="${favicon}" alt="icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1243/1243933.png'">
                        <span>${item.name}</span>
                    </a>
                `;
                container.appendChild(card);
            });
        }

        function addShortcut() {
            const name = nameInput.value;
            let url = urlInput.value;

            if (name && url) {
                // Garantir que a URL tenha http ou https
                if (!url.startsWith('http')) {
                    url = 'https://' + url;
                }

                shortcuts.push({ name, url });
                localStorage.setItem('myShortcuts', JSON.stringify(shortcuts));
                
                nameInput.value = '';
                urlInput.value = '';
                renderShortcuts();
            } else {
                alert("Por favor, preencha o nome e a URL.");
            }
        }

        function deleteShortcut(index) {
            shortcuts.splice(index, 1);
            localStorage.setItem('myShortcuts', JSON.stringify(shortcuts));
            renderShortcuts();
        }

        addBtn.addEventListener('click', addShortcut);

        // Permitir adicionar apertando Enter
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addShortcut();
        });

        // Inicializar
        renderShortcuts();
    </script>
</body>
</html>
